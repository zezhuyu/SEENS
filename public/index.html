<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Seens Radio</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/player.css" />

</head>
<body>
  <div id="app">
    <!-- Nav tabs -->
    <nav id="nav">
      <button class="nav-btn active" data-view="player">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z" stroke-dasharray="4 2"/></svg>
        <span>Radio</span>
      </button>
      <button class="nav-btn" data-view="profile">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Taste</span>
      </button>
      <button class="nav-btn" data-view="settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Settings</span>
      </button>
    </nav>

    <!-- Views -->
    <!-- Start overlay — one tap gives browser permission for all future autoplay -->
    <div id="start-overlay">
      <div id="start-card">
        <div id="start-logo">
          <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="24" cy="24" r="20"/><circle cx="24" cy="24" r="6"/>
            <line x1="24" y1="4" x2="24" y2="18"/><line x1="24" y1="30" x2="24" y2="44"/>
            <line x1="4" y1="24" x2="18" y2="24"/><line x1="30" y1="24" x2="44" y2="24"/>
          </svg>
        </div>
        <div id="start-title">Seens Radio</div>
        <div id="start-sub">Your personal AI DJ</div>
        <button id="start-btn">Start Radio</button>
      </div>
    </div>

    <div id="view-player" class="view active"></div>
    <div id="view-profile" class="view"></div>
    <div id="view-settings" class="view"></div>

    <!-- Debug panel — press D to toggle -->
    <div id="debug-panel" style="display:none;position:fixed;bottom:60px;left:0;right:0;background:#000;border-top:1px solid #333;font-family:monospace;font-size:11px;color:#0f0;max-height:180px;overflow-y:auto;padding:8px;z-index:999"></div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
