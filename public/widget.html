      fetch('/api/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          videoId: t.videoId ?? t.video_id ?? null,
          title:   t.resolvedTitle  ?? t.title,
          artist:  t.resolvedArtist ?? t.artist ?? '',
          rating:  'skip',
        }),
      }).catch(() => {});
    }
    // Don't pause when AirPlay is active — a pause + async-fetch gap causes the
    // AirPlay receiver to drop the session. The src change in playTrack will
    // stop the current audio naturally.
    if (!airplayActiveRef.current) audioRef.current.pause();
    introFiredRef.current = false;
    transitionReqRef.current = false;
    pendingIntroTTSRef.current = null;
    coldStartTrackRef.current = null;
    skipAfterTTSRef.current = false;
    // Immediately shift queue display so current track moves to position 1
    setQueue(prev => prev.slice(1).map((t, i) => ({ ...t, now: i === 0 })));
    try {
      const res = await fetch('/api/next', { method: 'POST' });
      const { track, upNext } = await res.json();
      updateUpNext(upNext);
      if (track) playTrack(track);
      else setPlaying(false);
      // Refresh queue from server to stay in sync with DB
      fetch('/api/now?full=1').then(r => r.json()).then(({ queue: q }) => {
        if (q?.length) setQueue(q.map((t, i) => ({ ...t, now: i === 0 })));
      }).catch(() => {});
    } catch (e) { console.error(e); }
  }, [playTrack, updateUpNext]);

  // store skipNext in a ref so playTrack can call it without deps
  const skipNextRef = useRef(skipNext);
  useEffect(() => { skipNextRef.current = skipNext; }, [skipNext]);

  // ── TTS ended handler
  useEffect(() => {
    const tts = ttsRef.current;
    const onEnded = () => {
      audioRef.current.volume = volumeRef.current / 100;
      ttsPlayingRef.current = false;
      playNextTTS();
      if (coldStartTrackRef.current) {
        // Clear flag first so skipNext doesn't find it and loop
        coldStartTrackRef.current = null;
        // Let skipNext dequeue & play track[0] from the server queue — same track
        // the DJ introduced, but fetched fresh (with correct streamUrl from DB)
        skipNextRef.current();
      } else if (skipAfterTTSRef.current) {
        skipAfterTTSRef.current = false;
        skipNextRef.current();
      }
    };
    const onError = () => {
      ttsPlayingRef.current = false;
      audioRef.current.volume = volumeRef.current / 100;
      // TTS resource error — same recovery as play rejection
      if (coldStartTrackRef.current) { coldStartTrackRef.current = null; skipNextRef.current?.(); }
      else if (skipAfterTTSRef.current) { skipAfterTTSRef.current = false; skipNextRef.current?.(); }
    };
    tts.addEventListener('ended', onEnded);
    tts.addEventListener('error', onError);
    return () => { tts.removeEventListener('ended', onEnded); tts.removeEventListener('error', onError); };
  }, [playNextTTS]);

  // ── main audio event handlers
  useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    const onPlay    = () => setPlaying(true);
    const onPause   = () => setPlaying(false);
    const onEnded   = () => { setPlaying(false); skipNextRef.current(); };
    const onError   = () => {
      if (waitForInteractRef.current) return;
      setTimeout(() => skipNextRef.current(), 1500);
    };
    const onTimeUpdate = () => {
      const cur = audio.currentTime, dur = audio.duration;
      // Hold the display at 0:00 / --:-- until the new track's currentTime
      // actually advances. Without this, stale audio.duration from the previous
      // track (retained briefly when load() is skipped for AirPlay) overwrites
      // the reset that playTrack already applied.
      if (trackJustChangedRef.current) {
        if (cur > 0.05) {
          trackJustChangedRef.current = false; // new track is genuinely playing
        } else {
          setTimeCur('0:00');
          setTimeTotal('--:--');
          setProgress(0);
          return;
        }
      }
      if (!dur || !isFinite(dur) || isNaN(dur)) {
        // Live stream (AirPlay pipe) — use last known duration as fallback
        const fallback = trackDurationRef.current;
        setProgress(fallback ? Math.min(1, cur / fallback) : 0);
        setTimeCur(fmtTime(cur));
        setTimeTotal(fallback ? fmtTime(fallback) : '--:--');
        return;
      }
      trackDurationRef.current = dur; // save for AirPlay fallback
      setProgress(cur / dur);
      setTimeCur(fmtTime(cur));
      setTimeTotal(fmtTime(dur));
      const remaining = dur - cur;
      // Trigger transition generation at ~30s remaining
      if (!transitionReqRef.current && !pendingIntroTTSRef.current && remaining <= 30 && dur > 40) {
        transitionReqRef.current = true;
        fetch('/api/transition', { method: 'POST' }).catch(() => {});
      }
      // Fire pending DJ intro at 8s remaining
      if (!introFiredRef.current && pendingIntroTTSRef.current && remaining <= 8 && dur > 15) {
        introFiredRef.current = true;
        const url = pendingIntroTTSRef.current;
        pendingIntroTTSRef.current = null;
        enqueueTTS(url);
      }
    };
    audio.addEventListener('play',       onPlay);
    audio.addEventListener('pause',      onPause);
    audio.addEventListener('ended',      onEnded);
    audio.addEventListener('error',      onError);
    audio.addEventListener('timeupdate', onTimeUpdate);
    return () => {
      audio.removeEventListener('play',       onPlay);
      audio.removeEventListener('pause',      onPause);
      audio.removeEventListener('ended',      onEnded);
      audio.removeEventListener('error',      onError);
      audio.removeEventListener('timeupdate', onTimeUpdate);
    };
  }, [enqueueTTS]);

  // ── WS connection
  useEffect(() => {
    const handleDJResponse = (msg) => {
      // Ignore any in-flight responses that arrive after the user ended the session.
      // startedRef is set to false synchronously inside exitSession, so this guard
      // correctly discards delayed replies from the server.
      if (!startedRef.current) return;

      if (msg.say) {
        setDjText(msg.say);
        // Interim (plugin loading) messages show in the banner only — the real response
        // follows and adds itself to chat history. Keeps the conversation log clean.
        if (!msg.interim) {
          setDjMessages(prev => [...prev, { from:'dj', text:msg.say, time:fmtClock(new Date()) }]);
        }
      }
      if (msg.agent) setDjAgent(msg.agent);
      const audio = audioRef.current;
      const audioActive = playingRef.current || ttsPlayingRef.current || (audio.src && !audio.ended && !audio.error);
      const userAsked = msg.trigger === 'user-chat';
      const intent = msg.playIntent ?? (userAsked ? 'now' : 'end');

      // When a plugin is loading for a user request, block the near-end transition so
      // another track doesn't start playing while we're waiting for the plugin result.
      if (msg.interim && userAsked && !pendingIntroTTSRef.current) {
        pendingIntroTTSRef.current = 'plugin-loading';
      }
      // Real response arriving — clear the plugin-loading placeholder if it's still set
      if (!msg.interim && pendingIntroTTSRef.current === 'plugin-loading') {
        pendingIntroTTSRef.current = null;
      }

      // Update queue display only after intent is known:
      // - intent=now: replace entire queue, first track is the new "now playing"
      // - intent=next/end: fetch fresh queue from server so we don't falsely mark a queued
      //   track as "now" while the current song is still playing
      if (msg.play?.length) {
        if (intent === 'now') {
          setQueue(msg.play.map((t, i) => ({
            title: t.resolvedTitle ?? t.title,
            artist: t.resolvedArtist ?? t.artist ?? '',
            now: i === 0,
          })));
        } else {
          fetch('/api/now?full=1').then(r => r.json()).then(({ queue: q }) => {
            if (q?.length) setQueue(q.map((t, i) => ({ ...t, now: i === 0 })));
          }).catch(() => {});
        }
      }

      // If we're waiting for the user-chat cold-start response, ignore scheduler responses
      if (userChatPendingRef.current && !userAsked) return;
      if (userAsked) userChatPendingRef.current = false;

      if (audioActive && !userAsked) {
        if (msg.ttsUrl) {
          pendingIntroTTSRef.current = msg.ttsUrl;
          transitionReqRef.current = true;
        } else if (msg.trigger === 'auto-refill' && msg.play?.length > 0) {
          // Auto-refill added new tracks silently (no TTS generated server-side).
          // Reset so the onTimeUpdate transition check can fire for the first new track
          // and generate a proper intro when the current song is nearly done.
          transitionReqRef.current = false;
        }
      } else if (audioActive && userAsked) {
        if (intent === 'now') {
          if (msg.firstTrack) {
            // DJ introduced a new track — speak intro then switch
            coldStartTrackRef.current = msg.firstTrack;
            if (msg.ttsUrl) enqueueTTS(msg.ttsUrl);
            else skipNextRef.current();
          } else {
            // Conversational response (no new track) — just speak TTS, keep current song playing
            if (msg.ttsUrl) enqueueTTS(msg.ttsUrl);
          }
        } else if (intent === 'next') {
          if (msg.ttsUrl) { pendingIntroTTSRef.current = msg.ttsUrl; transitionReqRef.current = true; }
          const nt = msg.firstTrack ?? msg.play?.[0];
          if (nt) setUpNextTrack({ title: nt.resolvedTitle??nt.title, artist: nt.resolvedArtist??nt.artist??'' });
        } else if (intent === 'end' && msg.ttsUrl && !msg.firstTrack) {
          // Conversational answer queued at 'end' (no new music) — speak it without interrupting playback
          enqueueTTS(msg.ttsUrl);
        }
      } else {
        // cold start
        console.log('[handleDJResponse] cold-start path — ttsUrl:', msg.ttsUrl, 'firstTrack:', msg.firstTrack?.title ?? null);
        if (msg.ttsUrl && msg.firstTrack) {
          coldStartTrackRef.current = msg.firstTrack;
          enqueueTTS(msg.ttsUrl);
        } else if (msg.ttsUrl) {
          enqueueTTS(msg.ttsUrl);
        } else if (msg.firstTrack) {
          playTrack(msg.firstTrack);
        }
      }

      if (intent !== 'next' && msg.play?.length > 1) {
        const n = msg.play[1];
        setUpNextTrack({ title: n.resolvedTitle??n.title, artist: n.resolvedArtist??n.artist??'' });
      }
    };

    let reconnect;
    const connect = () => {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/stream`);
      wsRef.current = ws;
      ws.onopen = () => { setConnected(true); reconnectDelayRef.current = 1000; };
      ws.onmessage = (e) => {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.type === 'dj-response') handleDJResponse(msg);
        else if (msg.type === 'now-playing' && msg.track) setCurrentTrack(msg.track);
        else if (msg.type === 'command') {
          if (msg.action === 'pause') audioRef.current.pause();
          else if (msg.action === 'resume') audioRef.current.play().catch(()=>{});
          else if (msg.action === 'next') skipNextRef.current(true);
        }
        else if (msg.type === 'notification') {
          setNotifications(prev => [msg, ...prev].slice(0, 50));
          setUnreadCount(c => c + 1);
          playNotificationSound();
          clearTimeout(toastTimerRef.current);
          setToast(msg);
          toastTimerRef.current = setTimeout(() => setToast(null), 8000);
        }
        else if (msg.type === 'plugin-rest-piece') {
          setPluginPiece({ title: msg.title, imageUrl: msg.imageUrl, text: msg.text, sourceUrl: msg.sourceUrl, source: msg.source });
        }
        else if (msg.type === 'plugins-changed') {
          setPluginsVersion(v => v + 1);
        }
        else if (msg.type === 'session-context') {
          setSessionCtx(msg.context ?? '');
        }
      };
      ws.onclose = () => {
        setConnected(false);
        reconnect = setTimeout(connect, reconnectDelayRef.current = Math.min(reconnectDelayRef.current * 1.5, 30000));
      };
    };
    connect();
    return () => { clearTimeout(reconnect); wsRef.current?.close(); };
  }, [enqueueTTS, playTrack]);

  // ── start radio
  const startRadio = async () => {
    setOverlayLabel('Tuning in…');
    startedRef.current = true;
    setStarted(true);
    setSessionStart(Date.now());
    userChatPendingRef.current = true; // expect a user-chat dj-response; block scheduler
    waitForInteractRef.current = false;

    try {
      await fetch('/api/settings/queue/clear', { method: 'POST' });
      await fetch('/api/settings/session/start', { method: 'POST' });
      // Retry up to 3 times if the server is busy with another AI call
      for (let attempt = 0; attempt < 3; attempt++) {
        const chatRes = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'Start my listening session. Tell me what you have planned and introduce the first track.' }),
        });
        if (chatRes.status === 503) {
          const j = await chatRes.json().catch(() => ({}));
          if (j.retry && attempt < 2) {
            console.log(`[startRadio] server busy — retrying in 10s (attempt ${attempt + 1})`);
            setOverlayLabel('Tuning in…');
            await new Promise(r => setTimeout(r, 10_000));
            continue;
          }
        }
        if (!chatRes.ok) {
          const errJson = await chatRes.json().catch(() => ({ error: `HTTP ${chatRes.status}` }));
          console.error('[startRadio] /api/chat error:', errJson.error);
          setOverlayLabel(`DJ error: ${errJson.error}`);
          userChatPendingRef.current = false;
        }
        break; // success or non-retryable error
      }
      // On success, WS dj-response will dismiss overlay and start playback
    } catch (err) { console.error('[startRadio] fetch failed:', err); userChatPendingRef.current = false; skipNextRef.current(); }
  };

  // ── DJ chat send
  const sendChat = async (text) => {
    setDjMessages(prev => [...prev, { from:'user', text, time:fmtClock(new Date()) }]);
    setDjBusy(true);
    setDjText('...');
    try {
      await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      // response arrives via WS dj-response
    } catch {
      const fb = FALLBACK_LINES[Math.floor(Math.random() * FALLBACK_LINES.length)];
      setDjText(fb);
      setDjMessages(prev => [...prev, { from:'dj', text:fb, time:fmtClock(new Date()) }]);
    } finally { setDjBusy(false); }
  };

  // ── rest
  const preBreakSrcRef      = useRef('');
  const preBreakTimeRef     = useRef(0);
  const didPauseForBreakRef = useRef(false);
  const preBreakWindowSize  = useRef(null); // saved Electron window size before expansion

  const triggerRest = useCallback((skipTransition = false) => {
    // Save position but don't pause — music keeps playing until we know the piece is Music
    const audio = audioRef.current;
    preBreakSrcRef.current      = audio.src ?? '';
    preBreakTimeRef.current     = audio.currentTime ?? 0;
    didPauseForBreakRef.current = false;
    // Expand Electron window so the artwork panel has room
    if (isElectronApp && window.__electron__?.resizeWindow) {
      const getSz = window.__electron__.getWindowSize?.();
      (getSz ? getSz : Promise.resolve({ width: 380, height: 700 }))
        .then(sz => { preBreakWindowSize.current = sz || { width: 380, height: 700 }; })
        .catch(() => { preBreakWindowSize.current = { width: 380, height: 700 }; });
      window.__electron__.resizeWindow(460, 820);
    }
    setSessionSecs(0); // reset so the rest auto-end timer always counts from 0
    setResting(true);
    if (skipTransition) {
      // Manual "Take a break" — go straight to artwork
      setRestPhase('reveal');
    } else {
      // Auto-triggered (timer) — show transition screen for 2.5s, then reveal artwork
      setRestPhase('transition');
      restPhaseTimer.current = setTimeout(() => setRestPhase('reveal'), 2500);
    }
  }, []);

  const endRest = useCallback(() => {
    clearTimeout(restPhaseTimer.current);
    clearInterval(narratePollRef.current);
    narratePollRef.current = null;
    ttsRef.current.pause();
    ttsRef.current.src = '';
    ttsQueueRef.current         = []; // discard any queued narration so it can't play after rest ends
    ttsPlayingRef.current       = false;
    narratedPieceRef.current    = null;
    prefetchedRestRef.current   = null;
    restSessionRef.current     += 1;  // invalidate any in-flight piece fetch
    setResting(false);
    setRestPhase(null);
    setSessionSecs(0);
    // Restore Electron window to its previous size
    if (isElectronApp && window.__electron__?.resizeWindow) {
      const sz = preBreakWindowSize.current || { width: 380, height: 700 };
      window.__electron__.resizeWindow(sz.width, sz.height);
      preBreakWindowSize.current = null;
    }
    // Only restore if we paused for a Music piece
    if (didPauseForBreakRef.current) {
      didPauseForBreakRef.current = false;
      const audio = audioRef.current;
      if (preBreakSrcRef.current && preBreakSrcRef.current === audio.src) {
        audio.currentTime = preBreakTimeRef.current;
        audio.play().catch(() => {});
      } else if (preBreakSrcRef.current) {
        audio.src = preBreakSrcRef.current;
        audio.currentTime = preBreakTimeRef.current;
        audio.play().catch(() => {});
      }
    }
  }, []);

  // Reset like/dislike whenever a new track starts
  useEffect(() => { setTrackFeedback(null); }, [currentTrack?.videoId]);

  const submitFeedback = useCallback((rating) => {
    if (!currentTrack) return;
    setTrackFeedback(prev => {
      const next = prev === rating ? null : rating; // toggle off if same button
      if (next !== null) {
        fetch('/api/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            videoId: currentTrack.videoId ?? currentTrack.video_id ?? null,
            title:   currentTrack.resolvedTitle  ?? currentTrack.title,
            artist:  currentTrack.resolvedArtist ?? currentTrack.artist ?? '',
            rating:  next,
          }),
        }).catch(() => {});
      }
      return next;
    });
  }, [currentTrack]);

  const returnRest = useCallback(() => {
    setRestPhase('return');
  }, []);

  // keep refs in sync so timer effects (stale closures) can call them
  useEffect(() => { triggerRestRef.current  = triggerRest; },  [triggerRest]);
  useEffect(() => { endRestRef.current      = endRest;     },  [endRest]);
  useEffect(() => { returnRestRef.current   = returnRest;  },  [returnRest]);

  // ── exit session — stop everything and return to initial landing state
  const exitSession = useCallback(() => {
    const audio = audioRef.current;
    const tts   = ttsRef.current;
    audio.pause();
    audio.src = '';
    tts.pause();
    tts.src = '';
    ttsQueueRef.current        = [];
    ttsPlayingRef.current      = false;
    pendingIntroTTSRef.current = null;
    coldStartTrackRef.current  = null;
    skipAfterTTSRef.current    = false;
    introFiredRef.current      = false;
    transitionReqRef.current   = false;
    waitForInteractRef.current = false;
    userChatPendingRef.current = false;
    narratedPieceRef.current   = null;
    prefetchedRestRef.current  = null;
    trackDurationRef.current   = null;
    trackJustChangedRef.current = false;
    clearTimeout(restPhaseTimer.current);
    setResting(false);
    setRestPhase(null);
    setStarted(false);
    setSessionStart(null);
    startedRef.current = false;
    setPlaying(false);
    setCurrentTrack(null);
    setUpNextTrack(null);
    setQueue([]);
    setDjMessages([]);
    setDjText('Waiting for DJ...');
    setDjAgent('');
    setDjBusy(false);
    setSessionCtx('');
    setSessionSecs(0);
    setTimeCur('0:00');
    setTimeTotal('0:00');
    setProgress(0);
    setOverlayLabel('Tune in');
    fetch('/api/settings/queue/clear', { method: 'POST' }).catch(() => {});
  }, []);
  const nextPiece = () => {
    // Cancel any in-flight narration for the current piece before replacing it
    clearInterval(narratePollRef.current);
    narratePollRef.current = null;
    narratedPieceRef.current = null; // allow the next piece to be narrated
    ttsRef.current.pause();
    ttsRef.current.src = '';
    ttsQueueRef.current   = []; // discard queued narration for the piece we're leaving
    ttsPlayingRef.current = false;
    setRestPieceLoading(true);
    setRestPiece(null);
    const cat = categoryFilter !== 'All' ? `?cat=${encodeURIComponent(categoryFilter)}` : '';
    fetch(`/api/rest-piece${cat}`)
      .then(r => r.json())
      .then(p => { setRestPiece(p.error ? { _error: p.error } : p); setRestPieceLoading(false); })
      .catch(e => { setRestPiece({ _error: e.message ?? 'Failed to load' }); setRestPieceLoading(false); });
  };

  // ── derived
  const target = restIntervalMin * 60;
  const sessionProgress = Math.min(1, sessionSecs / target);
  const sessionRemaining = Math.max(0, target - sessionSecs);
  const hh = pad2(now.getHours()), mm = pad2(now.getMinutes()), ss = pad2(now.getSeconds());
  const startHHMM = sessionStart ? fmtClock(new Date(sessionStart)) : null;
  const trackTitle  = currentTrack?.resolvedTitle  ?? currentTrack?.title  ?? 'Seens Radio';
  const trackArtist = currentTrack?.resolvedArtist ?? currentTrack?.artist ?? 'Your AI DJ';

  // ── chat component
  const [chatText, setChatText] = useState('');
  const chatScrollRef = useRef(null);
  useEffect(() => {
    if (chatScrollRef.current) chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight;
  }, [djMessages, djBusy]);

  const submitChat = (e) => {
    e?.preventDefault();
    const t = chatText.trim();
    if (!t || djBusy) return;
    setChatText('');
    sendChat(t);
  };

  const categories = ['All','Music','Painting','Photograph','Film','Poem','Place','Building','Sculpture','Food','Story'];

  return (
    <div
      className={`widget ${size} ${resting ? 'resting' : ''} ${restPhase === 'reveal' ? 'rest-reveal' : ''} ${restPhase === 'return' ? 'rest-return' : ''}`}
      data-theme={dark ? 'dark' : 'light'}
      style={{ '--accent': accent, ...(isElectronApp ? { width:'100%', height:'100vh', borderRadius:0, boxShadow:'none', overflow:'hidden', transition:'none' } : {}) }}
    >

      {/* Titlebar */}
      <div className="titlebar">
        <div className="tl-dots"><span className="tl-dot r"/><span className="tl-dot y"/><span className="tl-dot g"/></div>
        <span className="title-name">SEENS{djAgent ? ` · ${djAgent}` : ''}</span>
        <div className="title-right">
          <div className="theme-pill">
            <button className={!dark?'active':''} onClick={() => setDark(false)}>L</button>
            <button className={dark?'active':''} onClick={() => setDark(true)}>D</button>
          </div>
          <div className="notif-wrap">
            <button className="size-toggle" onClick={() => { setShowNotifications(v => !v); if (!showNotifications) setUnreadCount(0); }} aria-label="Notifications">
              <Icon.Bell/>
              {unreadCount > 0 && <span className="notif-badge">{unreadCount > 9 ? '9+' : unreadCount}</span>}
            </button>
            {showNotifications && (
              <div className="notif-panel">
                <div className="notif-panel-hdr">
                  <span className="notif-panel-title">Notifications</span>
                  {notifications.length > 0 && (
                    <button className="notif-clear" onClick={() => setNotifications([])}>Clear all</button>
                  )}
                </div>
                <div className="notif-list">
                  {notifications.length === 0
                    ? <div className="notif-empty">No notifications yet</div>
                    : notifications.map(n => (
                      <div key={n.id} className="notif-item" onClick={() => n.link && window.open(n.link, '_blank')}>
                        <div className={`notif-dot ${n.level ?? 'info'}`}/>
                        <div className="notif-body">
                          <div className="notif-item-title">{n.title}</div>
                          <div className="notif-item-msg">{n.message}</div>
                          <div className="notif-item-time">{fmtClock(new Date(n.ts))}</div>
                        </div>
                      </div>
                    ))
                  }
                </div>
              </div>
            )}
          </div>
          <button className="size-toggle settings-open-btn" onClick={() => setShowSettings(true)} aria-label="Settings">
            <Icon.Settings/>
          </button>
          <button className="size-toggle widget-size-btn" onClick={() => {
            setSize(size === 'mini' ? 'expanded' : 'mini');
          }}>
            {size==='expanded' ? <Icon.Collapse/> : <Icon.Expand/>}
          </button>
        </div>
      </div>

     

      {/* Hero — clock / session timer */}
      <div className="hero">
        <div className="hero-status">
          <span style={{ display:'flex', alignItems:'center', gap:8 }}>
            {fmtDate(now)}
            {weather && (
              <span style={{ display:'inline-flex', alignItems:'center', gap:3, opacity:.80 }}>
                {wmoIcon(weather.code)}
                <span>{weather.tempC}°C</span>
              </span>
            )}
          </span>
          {started && connected && <span><span className="dot"/>LIVE</span>}
        </div>
        <div className="clock-normal">
          <div className="clock">
            <span>{hh}</span><span className="sep">:</span><span>{mm}</span>
            <span className="sec">{ss}</span>
          </div>
          <div className="clock-sub">
            <span>Good {now.getHours()<12?'morning':now.getHours()<18?'afternoon':'evening'}.</span>
            <span className="date">{restIntervalMin}m focus</span>
          </div>
        </div>
        <div className="session-swap">
          <div className="session-label">{size === 'mini' ? 'Next break in' : 'Current session · focus'}</div>
          <div className="session-time">{size === 'mini' ? fmtDuration(sessionRemaining) : fmtDuration(sessionSecs)}</div>
          <div className="session-progress"><i style={{ width:`${sessionProgress*100}%` }}/></div>
          <div className="session-meta">
            {size === 'mini'
              ? <span style={{ margin:'0 auto' }}>{startHHMM ? `STARTED ${startHHMM}` : ''}</span>
              : <>{startHHMM && <span>STARTED {startHHMM}</span>}<span>REST IN {fmtDuration(sessionRemaining)}</span></>
            }
          </div>
        </div>
      </div>

      {/* Player + Playlist — single tune-in gate covers both */}
      <div className="content-wrap" style={{ position:'relative', flex: size==='mini' ? '0 0 auto' : '1 1 auto', display:'flex', flexDirection:'column', minHeight:0 }}>

      {/* Player */}
      <div className={`player ${playing?'':'paused'}`} style={{ position:'relative' }}>
        <div className="player-top">
          <div className="equalizer"><i/><i/><i/><i/></div>
          <div className="track-info">
            <div className="track-title">{trackTitle}</div>
            <div className="track-artist">{trackArtist}</div>
            {upNextTrack && <div className="track-state">Up next: {upNextTrack.title}</div>}
          </div>
          {currentTrack && size !== 'mini' && (
            <div className="track-feedback">
              <button
                className={`fb-btn${trackFeedback === 'like' ? ' liked' : ''}`}
                title="Love this"
                onClick={() => submitFeedback('like')}>
                <Icon.ThumbUp/>
              </button>
              <button
                className={`fb-btn${trackFeedback === 'dislike' ? ' disliked' : ''}`}
                title="Not for me"
                onClick={() => submitFeedback('dislike')}>
                <Icon.ThumbDown/>
              </button>
            </div>
          )}
          <div className="transport">
            <button className="tr-btn" onClick={() => skipNextRef.current(true)} aria-label="Previous"><Icon.Prev/></button>
            <button className="tr-btn play" onClick={() => {
              if (playing) audioRef.current.pause();
              else if (audioRef.current.src) audioRef.current.play().catch(()=>{});
              else skipNextRef.current();
            }} aria-label="Play/Pause">
              {playing ? <Icon.Pause/> : <Icon.Play/>}
            </button>
            <button className="tr-btn" onClick={() => skipNextRef.current(true)} aria-label="Next"><Icon.Next/></button>
          </div>
        </div>
        <div className="progress" onClick={e => {
          const pct = e.offsetX / e.currentTarget.offsetWidth;
          if (audioRef.current.duration) audioRef.current.currentTime = pct * audioRef.current.duration;
        }}>
          <i style={{ width:`${progress*100}%` }}/>
        </div>
        <div className="progress-times"><span>{timeCur}</span><span>{timeTotal}</span></div>
        <div className="vol" style={{ paddingTop:'6px' }}>
          <Icon.Vol/>
          <input type="range" min={0} max={100} value={volume}
            onChange={e => { const v = Number(e.target.value); setVolume(v); audioRef.current.volume = v / 100; }}/>
          {/* AirPlay icon button — right of volume slider */}
          {(airplayInSafari || isElectron) && size !== 'mini' && (
            <div style={{ position:'relative', flexShrink:0 }}>
              <button
                className={`vol-airplay-btn${(airplayActive || sysAudioDevice || raopDevice || electronSysPicker) ? ' active' : ''}`}
                title={sysAudioDevice ? `AirPlay: ${sysAudioDevice.name} — click to stop` : raopDevice ? `AirPlay: ${raopDevice.name} — click to stop` : airplayActive ? 'AirPlay active — click to change output' : 'AirPlay'}
                onClick={airplayInSafari
                  ? () => audioRef.current?.webkitShowPlaybackTargetPicker?.()
                  : async () => {
                      if (sysAudioDevice) {
                        await fetch('/api/airplay/sys-select', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
                        setSysAudioDevice(null);
                      } else if (raopDevice) {
                        await fetch('/api/airplay/stop', { method:'POST' }).catch(() => {});
                        await fetch('/api/airplay/select', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' }).catch(() => {});
                        audioRef.current.muted = false;
                        setRaopDevice(null);
                      } else if (electronSysPicker) {
                        setElectronSysPicker(false);
                      } else {
                        setElectronSysDevices([{ _scanning: true }]);
                        setElectronSysPicker(true);
                        const [sysRes, apRes] = await Promise.allSettled([
                          fetch('/api/airplay/sys-devices').then(r => r.json()),
                          fetch('/api/airplay/devices').then(r => r.json()),
                        ]);
                        const sysDevs = sysRes.status === 'fulfilled' && !sysRes.value.error
                          ? (sysRes.value.devices ?? []).map(n => ({ name: n, type: 'sys' }))
                          : [];
                        const apDevs = apRes.status === 'fulfilled'
                          ? (apRes.value.devices ?? []).map(d => ({ ...d, type: 'raop' }))
                          : [];
                        const merged = [...apDevs, ...sysDevs];
                        setElectronSysDevices(merged.length ? merged : [{ _empty: true }]);
                      }
                    }
                }>
                {/* Apple-style AirPlay icon: screen outline + solid triangle */}
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-2"/>
                  <polygon points="12 15 17 21 7 21" fill="currentColor" stroke="none"/>
                </svg>
              </button>
              {isElectron && electronSysPicker && (
                <div style={{ position:'absolute', bottom:'calc(100% + 6px)', right:0, background:'var(--surface)', border:'0.5px solid var(--line)', borderRadius:8, padding:'4px 0', minWidth:220, zIndex:200, boxShadow:'0 4px 20px rgba(0,0,0,0.3)' }}>
                  {electronSysDevices.map((dev, i) => {
                    if (dev._scanning) return <div key="scan" style={{ padding:'8px 12px', fontSize:10, fontFamily:'var(--font-mono)', color:'var(--ink-3)' }}>Scanning…</div>;
                    if (dev._empty)   return <div key="empty" style={{ padding:'8px 12px', fontSize:10, fontFamily:'var(--font-mono)', color:'var(--ink-3)' }}>No devices found</div>;
                    if (dev._err)     return <div key={i} style={{ padding:'8px 12px', fontSize:10, fontFamily:'var(--font-mono)', color:'var(--ink-3)' }}>{dev._err}</div>;
                    return (
                      <button key={dev.name + dev.type}
                        style={{ display:'block', width:'100%', textAlign:'left', padding:'6px 12px', fontSize:11, fontFamily:'var(--font-mono)', background:'none', border:'none', color:'var(--ink)', cursor:'pointer' }}
                        onMouseEnter={e => e.currentTarget.style.background='var(--surface-2)'}
                        onMouseLeave={e => e.currentTarget.style.background='none'}
                        onClick={async () => {
                          if (dev.type === 'raop') {
                            const sysRes = await fetch('/api/airplay/sys-select', {
                              method:'POST', headers:{'Content-Type':'application/json'},
                              body: JSON.stringify({ name: dev.name }),
                            }).then(r => r.json()).catch(() => null);
                            if (sysRes?.ok) {
                              setSysAudioDevice({ name: dev.name });
                              setTimeout(() => audioRef.current?.play().catch(() => {}), 900);
                            } else {
                              await fetch('/api/airplay/select', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name: dev.name, host: dev.host, port: dev.port }) });
                              setRaopDevice({ name: dev.name, host: dev.host, port: dev.port });
                            }
                          } else {
                            const r = await fetch('/api/airplay/sys-select', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name: dev.name }) });
                            if ((await r.json().catch(() => ({}))).ok) {
                              setSysAudioDevice({ name: dev.name });
                              setTimeout(() => audioRef.current?.play().catch(() => {}), 900);
                            }
                          }
                          setElectronSysPicker(false);
                        }}>
                        <span style={{ fontSize:9, opacity:0.5, marginRight:4 }}>{dev.type === 'raop' ? '📡' : '🔊'}</span>
                        {dev.name}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>
        {upnpRenderer && size !== 'mini' && (
          <div className="cast-row" style={{ display:'flex', gap:6, paddingTop:6 }}>
            <button title={`Casting to ${upnpRenderer.name} — click to stop`}
              style={{ appearance:'none', border:'0.5px solid var(--accent)', background:'var(--accent-weak)', color:'var(--accent)', borderRadius:6, padding:'3px 9px', fontSize:9, fontFamily:'var(--font-mono)', letterSpacing:'0.08em', cursor:'pointer', display:'flex', alignItems:'center', gap:4 }}
              onClick={() => {
                fetch('/api/upnp/stop', { method:'POST' }).catch(() => {});
                fetch('/api/upnp/select', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' }).then(() => setUpnpRenderer(null));
              }}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11zm20-7H3c-1.1 0-2 .9-2 2v3h2V5h18v12h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
              {upnpRenderer.name}
            </button>
          </div>
        )}
      </div>

      {/* Tab panel */}
      <div className="tab-panel" style={{ position:'relative' }}>
        <div className="tab-bar">
          <button className={`tab-btn ${activeTab==='queue'?'active':''}`} onClick={() => setActiveTab('queue')}>
            Playlist {queue.length > 0 && <span className="count">{queue.length}</span>}
          </button>
          <button className={`tab-btn ${activeTab==='chat'?'active':''}`} onClick={() => setActiveTab('chat')}>
            DJ
          </button>
        </div>
        <div className="tab-body">
          {activeTab === 'queue' ? (
            <div className="queue">
              <div className="queue-list">
                {queue.length === 0 ? (
                  <div style={{ padding:'16px 8px', color:'var(--ink-3)', fontSize:'11.5px', fontStyle:'italic' }}>
                    Queue loads when the DJ starts a session.
                  </div>
                ) : queue.map((t, i) => (
                  <div key={i} className={`queue-row ${i===0?'now':''}`}>
                    <span className="q-idx">{i===0?'▶':i+1}</span>
                    <div className="q-main">
                      <div className="q-title">{t.title}</div>
                      <div className="q-artist">{t.artist}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div className="chat">
              {sessionCtx && (
                <div className="session-ctx-bar">
                  <span className="ctx-label">Session</span>
                  <span className="ctx-text" title={sessionCtx}>{sessionCtx}</span>
                </div>
              )}
              <div className="chat-scroll" ref={chatScrollRef}>
                {djMessages.map((m, i) => (
                  <div key={i} className={`msg ${m.from==='user'?'user':'dj'}`}>
                    {m.from !== 'user' && <div className="avatar">A</div>}
                    <div className="bubble">{m.text}</div>
                    {m.time && <span className="time">{m.time}</span>}
                  </div>
                ))}
                {djBusy && (
                  <div className="msg dj">
                    <div className="avatar">A</div>
                    <div className="bubble" style={{ opacity:.7 }}>
                      <span className="typing-dots">typing<span>.</span><span>.</span><span>.</span></span>
                    </div>
                  </div>
                )}
              </div>
              <form className="chat-input-row" onSubmit={submitChat}>
                <input type="text" placeholder="Ask the DJ anything…" value={chatText}
                  onChange={e => setChatText(e.target.value)} disabled={djBusy}/>
                <button type="submit" className="send-btn" disabled={!chatText.trim()||djBusy}><Icon.Send/></button>
              </form>
            </div>
          )}
        </div>
      </div>

      {!started && (
        <div className="tune-in-gate" style={{ borderRadius:0 }}>
          <div className="ti-label">SEENS · FM</div>
          <button className="ti-btn" onClick={() => {
            // Unlock TTS audio element and AudioContext during user gesture.
            // Only unlock ttsRef (not audioRef) — playing on audioRef triggers onEnded→skipNext
            // as an unwanted side effect. audioRef is unlocked by --autoplay-policy switch.
            const silentSrc = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
            try {
              const t = ttsRef.current; t.src = silentSrc; t.volume = 0; t.play().catch(() => {});
            } catch {}
            try {
              const ac = new AudioContext();
              ac.createBufferSource().connect(ac.destination);
              ac.resume();
            } catch {}
            startRadio();
          }} disabled={overlayLabel !== 'Tune in'}>{overlayLabel}</button>
        </div>
      )}
      </div>

      {/* Footer */}
      <div className="footer">
        <span>SEENS · FM</span>
        <div style={{ display:'flex', gap:12 }}>
          {started && <button className="rest-trigger" onClick={exitSession} style={{ transition:'color .15s' }} onMouseEnter={e => e.currentTarget.style.color='oklch(0.65 0.18 25)'} onMouseLeave={e => e.currentTarget.style.color=''}>End session</button>}
          <button className="rest-trigger" onClick={() => triggerRest(true)}>Take a break →</button>
        </div>
      </div>

      {/* Break transition screen */}
      <BreakTransition restDurationMin={restDurationMin}/>

      {/* Art reveal */}
      <ArtReveal piece={restPiece} loading={restPieceLoading} onDismiss={endRest} onReturn={endRest} onNext={nextPiece}/>

      {/* Return to work overlay */}
      <ReturnToWork onReturn={endRest}/>

      {/* Audio element — must be in DOM and NOT display:none for Safari AirPlay routing.
           x-webkit-airplay is also set via setAttribute in useEffect (React may not forward it). */}
      <audio ref={audioRef} preload="auto"
        style={{ position:'fixed', left:'-9999px', top:0, width:1, height:1, opacity:0 }} />

      {/* Settings panel */}
      <SettingsPanel
        open={showSettings}
        onClose={() => setShowSettings(false)}
        restIntervalMin={restIntervalMin}
        setRestIntervalMin={setRestIntervalMin}
        restDurationMin={restDurationMin}
        setRestDurationMin={setRestDurationMin}
        sysAudioDevice={sysAudioDevice}
        setSysAudioDevice={setSysAudioDevice}
        pluginsVersion={pluginsVersion}
      />

      {/* Notification toast */}
      {toast && (
        <div className="notif-toast">
          <div className={`notif-dot ${toast.level ?? 'info'}`} style={{ marginTop:4 }}/>
          <div className="notif-toast-body">
            <div className="notif-toast-title">{toast.title}</div>
            <div className="notif-toast-msg">{toast.message}</div>
          </div>
          <button className="notif-toast-close" onClick={() => { clearTimeout(toastTimerRef.current); setToast(null); }}>
            <Icon.Close/>
          </button>
        </div>
      )}
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
const isElectronApp = !!window.__electron__?.isElectron;
function getElectronSize() { return window.innerHeight < 420 ? 'mini' : 'expanded'; }

function App() {
  const [size,            setSize]            = useState(isElectronApp ? getElectronSize() : 'expanded');
  const [dark,            setDark]            = useState(true);

  // In Electron, drive mini vs expanded from the window height automatically
  useEffect(() => {
    if (!isElectronApp) return;
    const onResize = () => setSize(getElectronSize());
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  const [accent,          setAccent]          = useState('#33c173');
  const [volume,          setVolume]          = useState(() => parseInt(localStorage.getItem('seens-volume') ?? '80') || 80);
  const [restIntervalMin, setRestIntervalMin] = useState(45);
  const [restDurationMin, setRestDurationMin] = useState(5);
  const [categoryFilter,  setCategoryFilter]  = useState('All');

  // Persist volume to localStorage whenever it changes
  useEffect(() => { localStorage.setItem('seens-volume', String(volume)); }, [volume]);

  // Restore persisted timer lengths on mount
  useEffect(() => {
    fetch('/api/settings')
      .then(r => r.ok ? r.json() : null)
      .then(s => {
        if (!s) return;
        if (s.workMin) setRestIntervalMin(parseInt(s.workMin) || 45);
        if (s.restMin) setRestDurationMin(parseInt(s.restMin) || 5);
      })
      .catch(() => {});
  }, []);

  return (
    <>
      <div style={{
        position:'fixed', inset:0, opacity:.8, pointerEvents:'none',
        background:
          'radial-gradient(ellipse at 20% 15%, oklch(0.75 0.12 230 / 0.6), transparent 55%),' +
          'radial-gradient(ellipse at 85% 85%, oklch(0.78 0.10 30 / 0.5), transparent 55%),' +
          'radial-gradient(ellipse at 50% 50%, oklch(0.80 0.07 170 / 0.4), transparent 65%)',
      }}/>
      <SeensWidget
        size={size} setSize={setSize}
        dark={dark} setDark={setDark}
        accent={accent}
        volume={volume} setVolume={setVolume}
        restIntervalMin={restIntervalMin} setRestIntervalMin={setRestIntervalMin}
        restDurationMin={restDurationMin} setRestDurationMin={setRestDurationMin}
        categoryFilter={categoryFilter} setCategoryFilter={setCategoryFilter}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
