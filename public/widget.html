<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEENS — Taste Widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        oklch(0.97 0.004 80);
  --surface:   oklch(0.99 0.003 80);
  --surface-2: oklch(0.94 0.005 80);
  --line:      oklch(0.88 0.006 80);
  --line-soft: oklch(0.92 0.005 80);
  --ink:       oklch(0.22 0.01 260);
  --ink-2:     oklch(0.42 0.01 260);
  --ink-3:     oklch(0.62 0.008 260);
  --accent:    oklch(0.58 0.14 155);
  --accent-weak: oklch(0.94 0.04 155);
  --shadow:    0 30px 80px -20px rgba(20,20,30,.28), 0 10px 30px -15px rgba(20,20,30,.18);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}
[data-theme="dark"] {
  --bg:        oklch(0.18 0.008 260);
  --surface:   oklch(0.21 0.01 260);
  --surface-2: oklch(0.25 0.01 260);
  --line:      oklch(0.30 0.012 260);
  --line-soft: oklch(0.26 0.01 260);
  --ink:       oklch(0.96 0.005 80);
  --ink-2:     oklch(0.78 0.01 80);
  --ink-3:     oklch(0.58 0.01 260);
  --accent:    oklch(0.78 0.14 155);
  --accent-weak: oklch(0.28 0.06 155);
  --shadow:    0 40px 100px -20px rgba(0,0,0,.7), 0 10px 40px -15px rgba(0,0,0,.5);
}
* { box-sizing: border-box; }
html, body { margin:0; padding:0; height:100%; font-family:var(--font-sans); color:var(--ink); -webkit-font-smoothing:antialiased; }

/* ── Electron: widget fills the entire window ── */
html.electron { height: 100vh; overflow: hidden; }
html.electron body {
  display: block;
  background: var(--bg);
  height: 100vh;
  overflow: hidden;
  margin: 0; padding: 0;
}
html.electron #root {
  width: 100%;
  height: 100vh;
  overflow: hidden;
}
/* Widget: override fixed widths/heights so it fills the window */
html.electron .widget,
html.electron .widget.mini,
html.electron .widget.expanded {
  width: 100% !important;
  height: 100vh !important;
  max-width: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  overflow: hidden !important;
  transition: none !important;
}
/* Hide fake traffic-light dots — native ones are shown by Electron */
html.electron .tl-dots { display: none !important; }
/* Hide the expand/collapse size button — window resizing drives that */
html.electron .widget-size-btn { display: none !important; }
/* Shift titlebar and settings header right to clear native traffic lights (at x:12) */
html.electron .titlebar,
html.electron .settings-header {
  padding-left: 72px !important;
  -webkit-app-region: drag;
}
/* Interactive controls inside draggable headers must not be in the drag zone */
html.electron .titlebar button,
html.electron .theme-pill,
html.electron .settings-header button,
html.electron .settings-header a {
  -webkit-app-region: no-drag;
}

body {
  background:
    radial-gradient(ellipse at 20% 15%, oklch(0.75 0.10 230 / 0.55), transparent 55%),
    radial-gradient(ellipse at 85% 85%, oklch(0.78 0.09 30 / 0.45), transparent 55%),
    radial-gradient(ellipse at 50% 50%, oklch(0.80 0.06 170 / 0.35), transparent 65%),
    linear-gradient(180deg, #1a1d2a 0%, #0e1017 100%);
  background-attachment: fixed;
  display: grid;
  place-items: center;
  min-height: 100vh;
}
.widget {
  position: relative;
  background: var(--surface);
  border-radius: 20px;
  box-shadow: 0 0 0 0.5px rgba(255,255,255,.08), 0 0 0 0.5px rgba(0,0,0,.35), var(--shadow);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: width .35s cubic-bezier(.3,.7,.3,1), height .35s cubic-bezier(.3,.7,.3,1);
}
.widget.mini     { width:340px; height:260px; }
.widget.expanded { width:440px; height:min(780px, calc(100dvh - 40px)); }
.widget.mini .tab-panel,.widget.mini .footer,.widget.mini .categories { display:none; }
.widget.mini .hero { flex:1 1 auto; display:flex; flex-direction:column; justify-content:center; padding:10px 20px; text-align:center; border-bottom:0; }
.widget.mini .hero-status { display:none; }
.widget.mini .clock { font-size:68px; justify-content:center; }
.widget.mini .clock .sec { display:none; }
.widget.mini .clock-sub { display:none; }
.widget.mini .content-wrap { flex:0 0 auto; }
.widget.mini .player { padding:10px 18px 14px; gap:10px; flex-shrink:0; border-top:0.5px solid var(--line-soft); }
.widget.mini .player-top { flex-direction:row; align-items:center; gap:10px; text-align:left; }
.widget.mini .player-top .equalizer { display:none; }
.widget.mini .vol { display:none; }
.widget.mini .cast-row { display:none; }
.widget.mini .track-info { text-align:left; flex:1; min-width:0; }
.widget.mini .track-title { font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.widget.mini .track-artist { font-size:11.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.widget.mini .player-top .transport { display:flex; gap:4px; flex-shrink:0; }
.widget.mini .player-top .transport .tr-btn { width:30px; height:30px; }
.widget.mini .player-top .transport .tr-btn.play { width:32px; height:32px; }
.widget.mini .progress-times { display:none; }
.widget.mini .session-swap { inset:0; display:flex; flex-direction:column; justify-content:center; text-align:center; padding:10px 20px; }
.widget.mini .session-swap .session-time { font-size:54px; }
.widget.mini .session-swap .session-label,.widget.mini .session-swap .session-meta { justify-content:center; text-align:center; }
.titlebar { display:flex; align-items:center; gap:8px; padding:10px 12px 8px; border-bottom:0.5px solid var(--line-soft); flex-shrink:0; }
.tl-dots { display:flex; gap:6px; }
.tl-dot { width:11px; height:11px; border-radius:50%; border:0.5px solid rgba(0,0,0,.12); }
.tl-dot.r { background:#ff5f57; }
.tl-dot.y { background:#febc2e; }
.tl-dot.g { background:#28c840; }
.title-name { font-family:var(--font-mono); font-size:10px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-3); margin-left:6px; white-space:nowrap; }
.title-right { margin-left:auto; display:flex; align-items:center; gap:10px; flex-shrink:0; }
.theme-pill { display:flex; background:var(--surface-2); border-radius:999px; padding:2px; border:0.5px solid var(--line); }
.theme-pill button { appearance:none; border:0; background:transparent; font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-3); padding:4px 8px; min-width:22px; border-radius:999px; cursor:pointer; transition:background .18s,color .18s; }
.theme-pill button.active { background:var(--ink); color:var(--surface); }
.size-toggle { appearance:none; border:0; background:transparent; color:var(--ink-3); width:22px; height:22px; border-radius:6px; cursor:pointer; display:grid; place-items:center; }
.size-toggle:hover { background:var(--surface-2); color:var(--ink); }
.hero { position:relative; padding:24px 22px 22px; border-bottom:0.5px solid var(--line-soft); flex-shrink:0; overflow:hidden; }
.widget.expanded .hero { padding:40px 28px 32px; }
.hero-status { display:flex; align-items:center; justify-content:space-between; font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-3); margin-bottom:14px; white-space:nowrap; }
.hero-status .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent); margin-right:6px; vertical-align:middle; box-shadow:0 0 0 3px color-mix(in oklch,var(--accent) 25%,transparent); animation:pulse 2.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 3px color-mix(in oklch,var(--accent) 20%,transparent);} 50%{box-shadow:0 0 0 6px color-mix(in oklch,var(--accent) 5%,transparent);} }
.clock { font-family:var(--font-mono); font-weight:200; font-size:64px; letter-spacing:-0.04em; color:var(--ink); line-height:1; font-variant-numeric:tabular-nums; display:flex; align-items:baseline; gap:4px; }
.widget.expanded .clock { font-size:88px; }
.clock .sep { opacity:.28; animation:blink 2s steps(2) infinite; }
.clock .sec { font-size:22px; color:var(--ink-3); margin-left:8px; font-weight:300; }
.widget.expanded .clock .sec { font-size:30px; }
@keyframes blink { 50%{opacity:.1;} }
.clock-sub { margin-top:8px; display:flex; align-items:baseline; justify-content:space-between; font-family:var(--font-sans); font-size:13px; color:var(--ink-2); }
.clock-sub .date { font-family:var(--font-mono); font-size:11px; color:var(--ink-3); letter-spacing:.05em; }
.hero .session-swap { position:absolute; inset:0; padding:inherit; background:var(--surface); display:flex; flex-direction:column; justify-content:center; opacity:0; pointer-events:none; transition:opacity .22s ease; }
.hero:hover .session-swap { opacity:1; }
.hero:hover .clock-normal { opacity:0; }
.clock-normal { transition:opacity .22s ease; }
.session-swap .session-label { font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-3); margin-bottom:14px; }
.session-swap .session-time { font-family:var(--font-mono); font-size:52px; font-weight:200; letter-spacing:-0.03em; color:var(--ink); line-height:1; font-variant-numeric:tabular-nums; }
.widget.expanded .session-swap .session-time { font-size:70px; }
.session-progress { margin-top:16px; height:3px; background:var(--surface-2); border-radius:999px; overflow:hidden; }
.session-progress > i { display:block; height:100%; background:var(--accent); border-radius:999px; transition:width .3s ease; }
.session-meta { margin-top:8px; display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:10px; color:var(--ink-3); letter-spacing:.05em; }
.player { padding:14px 18px 10px; display:flex; flex-direction:column; gap:10px; flex-shrink:0; border-bottom:0.5px solid var(--line-soft); }
.player-top { display:flex; align-items:center; gap:10px; }
.equalizer { display:flex; align-items:end; gap:2px; width:16px; height:14px; }
.equalizer i { display:block; width:2px; background:var(--accent); border-radius:1px; animation:eq 1.2s ease-in-out infinite; }
.equalizer i:nth-child(1){height:40%;animation-delay:-.3s;}
.equalizer i:nth-child(2){height:80%;animation-delay:-.6s;}
.equalizer i:nth-child(3){height:55%;animation-delay:-.9s;}
.equalizer i:nth-child(4){height:90%;}
@keyframes eq{0%,100%{transform:scaleY(.3);}50%{transform:scaleY(1);}}
.player.paused .equalizer i { animation-play-state:paused; transform:scaleY(.3); }
.track-info { min-width:0; flex:1; }
.track-title { font-size:13px; font-weight:500; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.track-artist { font-size:11.5px; color:var(--ink-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.track-state { font-family:var(--font-mono); font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-3); margin-top:2px; }
.transport { display:flex; align-items:center; gap:4px; }
.track-feedback { display:flex; gap:1px; flex-shrink:0; }
.fb-btn { appearance:none; border:none; background:transparent; padding:4px; cursor:pointer; color:var(--ink-3); border-radius:4px; opacity:0.55; transition:color .15s, opacity .15s; display:grid; place-items:center; }
.fb-btn:hover { color:var(--ink); opacity:1; }
.fb-btn.liked { color:#e8574a; opacity:1; }
.fb-btn.disliked { color:var(--ink-2); opacity:1; }
.widget.mini .track-feedback { display:none; }
.tr-btn { appearance:none; border:0; background:transparent; width:28px; height:28px; border-radius:8px; color:var(--ink-2); display:grid; place-items:center; cursor:pointer; transition:background .15s,color .15s; }
.tr-btn:hover { background:var(--surface-2); color:var(--ink); }
.tr-btn.play { background:var(--ink); color:var(--surface); width:30px; height:30px; }
.tr-btn.play:hover { opacity:.88; }
.progress { height:3px; background:var(--surface-2); border-radius:999px; overflow:hidden; cursor:pointer; }
.progress i { display:block; height:100%; background:var(--ink); border-radius:999px; transition:width .3s linear; }
.progress-times { display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:10px; color:var(--ink-3); letter-spacing:.05em; }
.vol { display:flex; align-items:center; gap:6px; color:var(--ink-3); }
.vol input[type=range] { appearance:none; -webkit-appearance:none; flex:1; min-width:0; height:3px; background:var(--surface-2); border-radius:999px; outline:none; }
.vol input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:10px; height:10px; border-radius:50%; background:var(--ink); cursor:pointer; }
.vol-airplay-btn { appearance:none; border:none; background:transparent; padding:3px; cursor:pointer; color:var(--ink-3); display:grid; place-items:center; border-radius:4px; flex-shrink:0; opacity:0.65; transition:color .15s,opacity .15s; }
.vol-airplay-btn:hover { color:var(--ink); opacity:1; }
.vol-airplay-btn.active { color:var(--accent); opacity:1; }
.tab-panel { flex:1 1 auto; display:flex; flex-direction:column; min-height:0; border-bottom:0.5px solid var(--line-soft); }
.tab-bar { display:flex; padding:8px 14px 0; gap:4px; align-items:center; flex-shrink:0; }
.tab-btn { appearance:none; border:0; background:transparent; padding:8px 10px 9px; font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-3); cursor:pointer; position:relative; display:flex; align-items:center; gap:6px; white-space:nowrap; transition:color .15s; }
.tab-btn:hover { color:var(--ink-2); }
.tab-btn.active { color:var(--ink); }
.tab-btn.active::after { content:''; position:absolute; left:10px; right:10px; bottom:-0.5px; height:1.5px; background:var(--accent); border-radius:1px; }
.tab-btn .count { font-family:var(--font-mono); font-size:8.5px; padding:2px 5px; border-radius:999px; background:var(--surface-2); color:var(--ink-3); letter-spacing:0.05em; }
.tab-btn.active .count { background:var(--accent-weak); color:var(--accent); }
.tab-bar .tab-meta { margin-left:auto; font-family:var(--font-mono); font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-3); white-space:nowrap; display:flex; align-items:center; gap:5px; }
.tab-meta .dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 2px color-mix(in oklch,var(--accent) 25%,transparent); }
.tab-body { flex:1 1 auto; min-height:0; display:flex; flex-direction:column; border-top:0.5px solid var(--line-soft); }
.queue { flex:1 1 auto; display:flex; flex-direction:column; min-height:0; }
.queue-list { flex:1 1 auto; min-height:0; overflow-y:auto; padding:8px 10px 10px; scrollbar-width:thin; scrollbar-color:var(--line) transparent; }
.queue-list::-webkit-scrollbar { width:6px; }
.queue-list::-webkit-scrollbar-thumb { background:var(--line); border-radius:999px; }
.queue-row { display:grid; grid-template-columns:18px 1fr auto; align-items:center; gap:10px; padding:7px 8px; border-radius:8px; font-size:12px; color:var(--ink-2); cursor:pointer; transition:background .12s; }
.queue-row:hover { background:var(--surface-2); }
.queue-row.now { background:var(--accent-weak); color:var(--ink); }
.queue-row.now .q-idx { color:var(--accent); }
.q-idx { font-family:var(--font-mono); font-size:10px; color:var(--ink-3); text-align:center; }
.q-main { min-width:0; display:flex; flex-direction:column; }
.q-title { color:var(--ink); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:12.5px; }
.queue-row:not(.now) .q-title { font-weight:400; }
.q-artist { font-size:10.5px; color:var(--ink-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.q-dur { font-family:var(--font-mono); font-size:10px; color:var(--ink-3); }
.chat { flex:1 1 auto; display:flex; flex-direction:column; min-height:0; }
.session-ctx-bar { padding:6px 14px; border-bottom:0.5px solid var(--line-soft); background:var(--surface-2); font-size:10.5px; color:var(--ink-2); display:flex; align-items:baseline; gap:6px; flex-shrink:0; }
.session-ctx-bar .ctx-label { font-family:var(--font-mono); font-size:8.5px; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); flex-shrink:0; }
.session-ctx-bar .ctx-text { font-style:italic; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.chat-scroll { flex:1 1 auto; min-height:0; overflow-y:auto; padding:10px 18px 10px; scrollbar-width:thin; scrollbar-color:var(--line) transparent; display:flex; flex-direction:column; gap:10px; }
.chat-scroll::-webkit-scrollbar { width:6px; }
.chat-scroll::-webkit-scrollbar-thumb { background:var(--line); border-radius:999px; }
.msg { display:flex; gap:8px; font-size:12.5px; line-height:1.5; }
.msg.user { justify-content:flex-end; }
.msg .bubble { background:var(--surface-2); color:var(--ink); padding:8px 11px; border-radius:12px; max-width:78%; border-top-left-radius:4px; }
.msg.user .bubble { background:var(--ink); color:var(--surface); border-top-left-radius:12px; border-top-right-radius:4px; }
.msg .avatar { width:24px; height:24px; border-radius:50%; flex-shrink:0; background:var(--accent); display:grid; place-items:center; color:var(--surface); font-size:10px; font-weight:600; font-family:var(--font-mono); }
.msg .time { font-family:var(--font-mono); font-size:9px; color:var(--ink-3); align-self:flex-end; letter-spacing:.05em; padding-bottom:4px; }
.chat-input-row { display:flex; align-items:center; gap:8px; padding:10px 14px 12px; border-top:0.5px solid var(--line-soft); }
.chat-input-row input { flex:1; appearance:none; border:0.5px solid var(--line); background:var(--surface-2); border-radius:999px; padding:8px 14px; font-family:var(--font-sans); font-size:12.5px; color:var(--ink); outline:none; }
.chat-input-row input::placeholder { color:var(--ink-3); }
.chat-input-row input:focus { border-color:var(--ink-3); background:var(--surface); }
.send-btn { appearance:none; border:0; width:30px; height:30px; border-radius:50%; background:var(--ink); color:var(--surface); display:grid; place-items:center; cursor:pointer; transition:opacity .15s; flex-shrink:0; }
.send-btn:hover { opacity:.88; }
.send-btn:disabled { opacity:.3; cursor:not-allowed; }
.dj-bar { padding:8px 18px; border-top:0.5px solid var(--line-soft); display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--ink-2); flex-shrink:0; }
.dj-bar .dj-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; box-shadow:0 0 0 3px color-mix(in oklch,var(--accent) 25%,transparent); animation:pulse 2.2s ease-in-out infinite; }
.dj-bar .dj-dot.idle { animation:none; background:var(--ink-3); box-shadow:none; }
.dj-bar .dj-text { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-style:italic; color:var(--ink-2); font-size:11.5px; }
.dj-bar .dj-agent { font-family:var(--font-mono); font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3); flex-shrink:0; }
.categories { display:flex; gap:4px; padding:8px 14px 10px; overflow-x:auto; scrollbar-width:none; border-bottom:0.5px solid var(--line-soft); flex-shrink:0; }
.categories::-webkit-scrollbar { display:none; }
.cat-chip { appearance:none; border:0.5px solid var(--line); background:transparent; padding:4px 10px; border-radius:999px; font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3); cursor:pointer; white-space:nowrap; transition:all .15s; }
.cat-chip:hover { border-color:var(--ink-3); color:var(--ink-2); }
.cat-chip.active { background:var(--ink); color:var(--surface); border-color:var(--ink); }
.footer { display:flex; justify-content:space-between; align-items:center; padding:7px 14px; font-family:var(--font-mono); font-size:8.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-3); border-top:0.5px solid var(--line-soft); flex-shrink:0; }
.footer .rest-trigger { appearance:none; border:0; background:transparent; font-family:inherit; font-size:inherit; letter-spacing:inherit; color:var(--ink-3); cursor:pointer; text-transform:inherit; }
.footer .rest-trigger:hover { color:var(--accent); }
.art-transition { position:absolute; inset:0; z-index:5; background:var(--surface); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; opacity:0; pointer-events:none; transition:opacity .6s cubic-bezier(.3,.7,.3,1); }
.widget.resting .art-transition { opacity:1; pointer-events:auto; }
.widget.resting.rest-reveal .art-transition { opacity:0; pointer-events:none; }
.art-transition .break-icon { width:52px; height:52px; border-radius:50%; border:1.5px solid var(--accent); display:grid; place-items:center; color:var(--accent); animation:breathe 3s ease-in-out infinite; }
.art-transition .break-label { font-family:var(--font-mono); font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-3); }
.art-transition .break-heading { font-size:26px; font-weight:400; letter-spacing:-0.02em; color:var(--ink); }
.art-transition .break-sub { font-family:var(--font-mono); font-size:11px; color:var(--ink-3); letter-spacing:0.06em; }

// ── ArtReveal ────────────────────────────────────────────────────────────────
function ArtReveal({ piece, loading, onDismiss, onReturn, onNext }) {
  const [tab, setTab] = useState('about');
  const [chatMsgs, setChatMsgs] = useState([]);
  const [chatBusy, setChatBusy] = useState(false);
  const [draft, setDraft] = useState('');
  const scrollRef = useRef(null);

  useEffect(() => { setChatMsgs([]); setTab('about'); }, [piece?.title]);
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [chatMsgs, chatBusy, tab]);

  const ask = async (text) => {
    if (!text || chatBusy || !piece) return;
    setTab('ask');
    setChatMsgs((m) => [...m, { from: 'user', text }]);
    setChatBusy(true);
    try {
      const r = await fetch('/api/guide', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ piece, question: text }),
      });
      const { reply } = await r.json();
      setChatMsgs((m) => [...m, { from: 'ai', text: reply }]);
    } catch {
      setChatMsgs((m) => [...m, { from: 'ai', text: "Can't reach the guide right now — try again in a moment." }]);
    } finally { setChatBusy(false); }
  };

  const submit = (e) => { e.preventDefault(); const t = draft.trim(); if (!t) return; setDraft(''); ask(t); };

  // Loading state
  if (loading || !piece) {
    return (
      <div className="art-reveal">
        <div className="art-image" style={{ background: 'linear-gradient(160deg,#1a1d2a 0%,#2a2d3a 100%)' }}>
          <button className="art-close" onClick={onDismiss}><Icon.Close/></button>
        </div>
        <div className="art-body" style={{ alignItems:'center', justifyContent:'center', gap:16 }}>
          <div style={{ color:'var(--ink-3)', fontFamily:'var(--font-mono)', fontSize:'10px', letterSpacing:'0.14em', textTransform:'uppercase' }}>
            <span className="typing-dots">Curating your break<span>.</span><span>.</span><span>.</span></span>
          </div>
          <div style={{ color:'var(--ink-3)', fontSize:'12px' }}>Finding something worth your attention</div>
        </div>
      </div>
    );
  }

  // Error state
  if (piece._error) {
    return (
      <div className="art-reveal">
        <div className="art-image" style={{ background: 'linear-gradient(160deg,#1a1d2a 0%,#2a2d3a 100%)' }}>
          <button className="art-close" onClick={onDismiss}><Icon.Close/></button>
        </div>
        <div className="art-body" style={{ alignItems:'center', justifyContent:'center', gap:16 }}>
          <div style={{ color:'var(--ink-3)', fontSize:'12px', textAlign:'center' }}>Couldn't load a recommendation right now.</div>
          <div className="art-actions">
            <button onClick={onNext}>Try again</button>
            <button className="primary" onClick={onReturn}>Back to work</button>
          </div>
        </div>
      </div>
    );
  }

  const suggestions = [`Who was ${piece.artist.split(' ').slice(-1)[0]}?`, 'Why does this matter?', 'What should I look at next?'];

  return (
    <div className="art-reveal">
      <div className="art-image" style={{ background: piece.bg, position:'relative', overflow:'hidden' }}>
        {piece.imageUrl && (
          <img
            src={piece.imageUrl}
            alt={piece.title}
            style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', opacity:0.85 }}
            onError={e => { e.target.style.display='none'; }}
          />
        )}
        <span className="cat-badge" style={{ zIndex:1 }}>{piece.cat}</span>
        <button className="art-close" style={{ zIndex:1 }} onClick={onDismiss}><Icon.Close/></button>
        {!piece.imageUrl && <div className="placeholder-label">{piece.title}</div>}
      </div>
      <div className="art-tabs">
        <button className={`art-tab ${tab==='about'?'active':''}`} onClick={() => setTab('about')}>About</button>
        <button className={`art-tab ${tab==='ask'?'active':''}`} onClick={() => setTab('ask')}>Ask AI</button>
      </div>
      {tab === 'about' && (
        <div className="art-body">
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div className="art-rest-note"><Icon.Sparkle/> You've been focused a while — take 5.</div>
            <div style={{ display:'flex', alignItems:'center', gap:5, fontFamily:'var(--font-mono)', fontSize:'9px', letterSpacing:'0.12em', textTransform:'uppercase', color:'var(--accent)', opacity:0.8 }}>
              <span className="equalizer" style={{ display:'flex', gap:2 }}>
                <span style={{ width:2, height:8, background:'var(--accent)', borderRadius:1, animation:'eq1 1.1s ease-in-out infinite' }}/>
                <span style={{ width:2, height:5, background:'var(--accent)', borderRadius:1, animation:'eq2 1.3s ease-in-out infinite' }}/>
                <span style={{ width:2, height:10, background:'var(--accent)', borderRadius:1, animation:'eq1 0.9s ease-in-out infinite' }}/>
              </span>
              DJ intro
            </div>
          </div>
          <div>
            <div className="art-title">{piece.title}</div>
            <div className="art-meta">
              <span>{piece.artist} · {piece.year}</span>
              {piece.source && <span className="art-source">{piece.source}</span>}
            </div>
          </div>
          <div className="art-caption">{piece.caption}</div>
          {piece.story && <div className="art-caption" style={{ color:'var(--ink-2)', fontSize:'12px' }}>{piece.story}</div>}
          <div className="art-fact">{piece.fact}</div>
          {piece.cat === 'Music' && piece.searchQuery && (
            <a
              href={`https://music.youtube.com/search?q=${encodeURIComponent(piece.searchQuery)}`}
              target="_blank"
              rel="noopener noreferrer"
              style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 12px', borderRadius:10, background:'var(--accent-weak)', color:'var(--accent)', fontSize:12, fontWeight:500, textDecoration:'none', border:'0.5px solid var(--accent)', width:'fit-content' }}
            >
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.376 0 0 5.376 0 12s5.376 12 12 12 12-5.376 12-12S18.624 0 12 0zm0 19.104c-3.924 0-7.104-3.18-7.104-7.104S8.076 4.896 12 4.896s7.104 3.18 7.104 7.104-3.18 7.104-7.104 7.104zm0-13.332c-3.432 0-6.228 2.796-6.228 6.228S8.568 18.228 12 18.228s6.228-2.796 6.228-6.228S15.432 5.772 12 5.772zM9.684 15.54V8.46L15.816 12l-6.132 3.54z"/></svg>
              Listen on YouTube Music
            </a>
          )}
          {piece.cat === 'Story' && piece.url && (
            <a
              href={piece.url}
              target="_blank"
              rel="noopener noreferrer"
              style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 12px', borderRadius:10, background:'var(--accent-weak)', color:'var(--accent)', fontSize:12, fontWeight:500, textDecoration:'none', border:'0.5px solid var(--accent)', width:'fit-content' }}
            >
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><path d="M2 6h8M6 2l4 4-4 4"/></svg>
              Read full story
            </a>
          )}
          <div className="art-actions">
            <button onClick={onNext}>Show another</button>
            <button className="primary" onClick={onReturn}>Back to work</button>
          </div>
        </div>
      )}
      {tab === 'ask' && (
        <div className="art-ask">
          <div className="art-chat-scroll" ref={scrollRef}>
            {chatMsgs.length === 0 && !chatBusy && (
              <div className="art-ask-empty">Ask anything — history, technique, where to see it, what to pair it with.</div>
            )}
            {chatMsgs.map((m, i) => (
              <div key={i} className={`msg ${m.from==='user'?'user':'dj'}`}>
                {m.from !== 'user' && <div className="avatar" style={{ background: piece.accent, color:'#111' }}>◉</div>}
                <div className="bubble">{m.text}</div>
              </div>
            ))}
            {chatBusy && (
              <div className="msg dj">
                <div className="avatar" style={{ background: piece.accent, color:'#111' }}>◉</div>
                <div className="bubble" style={{ opacity:.7 }}><span className="typing-dots">thinking<span>.</span><span>.</span><span>.</span></span></div>
              </div>
            )}
          </div>
          {chatMsgs.length === 0 && !chatBusy && (
            <div className="art-chat-suggest">{suggestions.map(s => <button key={s} onClick={() => ask(s)}>{s}</button>)}</div>
          )}
          <form className="chat-input-row" onSubmit={submit}>
            <input type="text" placeholder={`Ask about ${piece.title}…`} value={draft} onChange={e => setDraft(e.target.value)} disabled={chatBusy}/>
            <button type="submit" className="send-btn" disabled={!draft.trim()||chatBusy}><Icon.Send/></button>
          </form>
        </div>
      )}
    </div>
  );
}

// ── SettingsPanel ────────────────────────────────────────────────────────────
function SettingsPanel({ open, onClose, restIntervalMin, setRestIntervalMin, restDurationMin, setRestDurationMin, sysAudioDevice, setSysAudioDevice, pluginsVersion }) {
  const [s, setS]           = useState(null);   // server settings
  const [auth, setAuth]     = useState({});
  const [sysDevices, setSysDevices]     = useState(null);  // macOS audio output list
  const [sysLoading, setSysLoading]     = useState(false);
  const [syncing, setSyncing]   = useState(false);
  const [syncMsg, setSyncMsg]   = useState('');
  const [clearing, setClearing] = useState(false);
  const [upnpDevices,      setUpnpDevices]      = useState([]);
  const [upnpScanning,     setUpnpScanning]     = useState(false);
  const [upnpRenderer,     setUpnpRenderer]     = useState(null); // { name, controlUrl }
  const [promptDraft, setPromptDraft]               = useState('');
  const [restPrefsDraft, setRestPrefsDraft]         = useState('');
  const [storyInterestsDraft, setStoryInterestsDraft] = useState('');
  const [routinesDraft, setRoutinesDraft]           = useState('');
  const [moodRulesDraft, setMoodRulesDraft]         = useState('');
  const [tasteDraft, setTasteDraft]                 = useState('');
  const [locationDraft, setLocationDraft]           = useState('');

  const [plugins, setPlugins]                       = useState([]);
  const [addingPlugin, setAddingPlugin]             = useState(false);
  const [newPlugin, setNewPlugin]                   = useState({ name:'', description:'', baseUrl:'' });
  const [installUrl, setInstallUrl]                 = useState('');
  const [installState, setInstallState]             = useState('idle'); // idle|loading|error
  const [editingRaw, setEditingRaw]                 = useState(false);
  const [rawDraft, setRawDraft]                     = useState('');
  const [rawError, setRawError]                     = useState('');
  const [rawSaving, setRawSaving]                   = useState(false);
  const [musicConnectors, setMusicConnectors]       = useState([]);
  const [connectorKeyDrafts, setConnectorKeyDrafts] = useState({});
  const [apiKeys, setApiKeys]                       = useState({});
  const [apiKeyDrafts, setApiKeyDrafts]             = useState({});
  const [apiKeySaving, setApiKeySaving]             = useState(false);
  const [apiKeySaved, setApiKeySaved]               = useState('');
  const [apiKeysOpen, setApiKeysOpen]               = useState(false);
  const [manifestDraft, setManifestDraft]           = useState('');
  const [manifestState, setManifestState]           = useState('idle');

  useEffect(() => {
    if (!open) return;
    Promise.allSettled([
      fetch('/api/settings').then(r => r.ok ? r.json() : Promise.reject(r.status)),
      fetch('/api/settings/auth-status').then(r => r.ok ? r.json() : Promise.reject(r.status)),
      fetch('/api/settings/rest-prefs').then(r => r.ok ? r.json() : Promise.reject(r.status)),
      fetch('/api/settings/story-interests').then(r => r.ok ? r.json() : Promise.reject(r.status)),
      fetch('/api/plugins').then(r => r.ok ? r.json() : []),
      fetch('/api/music-connectors').then(r => r.ok ? r.json() : []),
      fetch('/api/settings/routines').then(r => r.ok ? r.json() : {}),
      fetch('/api/settings/mood-rules').then(r => r.ok ? r.json() : {}),
      fetch('/api/settings/taste').then(r => r.ok ? r.json() : {}),
      fetch('/api/settings/env-keys').then(r => r.ok ? r.json() : {}),
    ]).then(([settingsRes, authRes, prefsRes, storyRes, pluginsRes, connectorsRes, routinesRes, moodRes, tasteRes, envKeysRes]) => {
      const settings = settingsRes.status === 'fulfilled' ? settingsRes.value : {};
      const authStatus = authRes.status === 'fulfilled' ? authRes.value : {};
      const restPrefs = prefsRes.status === 'fulfilled' ? prefsRes.value : { content: '' };
      const storyInterests = storyRes.status === 'fulfilled' ? storyRes.value : { content: '' };
      if (settingsRes.status === 'rejected') console.warn('[Settings] load failed:', settingsRes.reason);
      if (prefsRes.status === 'rejected') console.warn('[Settings] rest-prefs load failed — restart server?', prefsRes.reason);
      setS(settings);
      setAuth(authStatus);
      setPromptDraft(settings.prompt ?? '');
      setRestPrefsDraft(restPrefs.content ?? '');
      setStoryInterestsDraft(storyInterests.content ?? '');
      setRoutinesDraft(routinesRes.status === 'fulfilled' ? (routinesRes.value.content ?? '') : '');
      setMoodRulesDraft(moodRes.status === 'fulfilled' ? (moodRes.value.content ?? '') : '');
      setTasteDraft(tasteRes.status === 'fulfilled' ? (tasteRes.value.content ?? '') : '');
      setLocationDraft(settings.location ?? '');

      setPlugins(pluginsRes.status === 'fulfilled' ? pluginsRes.value : []);
      setMusicConnectors(connectorsRes.status === 'fulfilled' ? connectorsRes.value : []);
      setApiKeys(envKeysRes.status === 'fulfilled' ? envKeysRes.value : {});
    });
  }, [open]);

  // Hot-reload: re-fetch plugins and connectors whenever plugins.json changes
  useEffect(() => {
    if (!open || pluginsVersion === 0) return;
    fetch('/api/plugins').then(r => r.ok ? r.json() : []).then(setPlugins).catch(() => {});
    fetch('/api/music-connectors').then(r => r.ok ? r.json() : []).then(setMusicConnectors).catch(() => {});
  }, [pluginsVersion]);

  const save = (patch) => {
    // Normalise dotted API keys → the flat field names the UI reads from `s`
    const localPatch = { ...patch };
    if ('mood.energy' in patch) localPatch.energy = patch['mood.energy'];
    if ('tts.voice'   in patch) localPatch.voice  = patch['tts.voice'];
    setS(prev => ({ ...prev, ...localPatch }));

    const body = {};
    if ('agent' in patch) {
      fetch('/api/settings/agent', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ agent: patch.agent }) });
      return;
    }
    if ('tts.voice'   in patch) body['tts.voice']   = patch['tts.voice'];
    if ('mood.energy' in patch) body['mood.energy']  = patch['mood.energy'];
    if ('chatSpeak'   in patch) body.chatSpeak       = patch.chatSpeak;
    fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  };

  const savePrompt = () => {
    fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ prompt: promptDraft }) });
    setS(prev => ({ ...prev, prompt: promptDraft }));
  };

  const saveRestPrefs = () => {
    fetch('/api/settings/rest-prefs', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ content: restPrefsDraft }) });
  };

  const saveStoryInterests = () => {
    fetch('/api/settings/story-interests', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ content: storyInterestsDraft }) });
  };

  const saveRoutines = () => {
    fetch('/api/settings/routines', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ content: routinesDraft }) });
  };

  const saveMoodRules = () => {
    fetch('/api/settings/mood-rules', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ content: moodRulesDraft }) });
  };

  const saveTaste = () => {
    fetch('/api/settings/taste', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ content: tasteDraft }) });
  };

  const saveLocation = () => {
    fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ location: locationDraft }) });
  };

  const saveTimer = (workMin, restMin) => {
    fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ workMin, restMin }) });
  };

  const connectService = (provider) => {
    const w = window.open(`/api/auth/${provider}`, `${provider}-auth`, 'width=600,height=700,left=200,top=100');
    // Poll auth-status for 60s — handles both normal popup-closed detection and
    // Electron in-app popup windows where w.closed may not fire reliably.
    let polls = 0;
    const poll = setInterval(() => {
      polls++;
      if (polls > 30) { clearInterval(poll); return; } // stop after 60s
      fetch('/api/settings/auth-status').then(r => r.json()).then(setAuth);
      if (w && w.closed) clearInterval(poll);
    }, 2000);
  };

  const connectConnector = async (connector) => {
    if (connector.authType !== 'oauth2') return;
    let authUrl;
    try {
      const r = await fetch(`/api/music-connectors/${encodeURIComponent(connector.name)}/auth-init`, { method: 'POST' });
      const d = await r.json();
      authUrl = d.authUrl;
    } catch { return; }
    if (!authUrl) return;
    const w = window.open(authUrl, `${connector.name}-auth`, 'width=600,height=700,left=200,top=100');
    let polls = 0;
    const poll = setInterval(async () => {
      polls++;
      if (polls > 30) { clearInterval(poll); return; }
      try {
        const status = await fetch(`/api/music-connectors/${encodeURIComponent(connector.name)}/auth-status`).then(r => r.json());
        if (status.connected) {
          setMusicConnectors(prev => prev.map(c => c.name === connector.name ? { ...c, connected: true, user: status.user ?? null } : c));
          clearInterval(poll);
        }
      } catch {}
      if (w && w.closed) clearInterval(poll);
    }, 2000);
  };

  const saveConnectorKey = async (name, key) => {
    if (!key.trim()) return;
    await fetch(`/api/music-connectors/${encodeURIComponent(name)}/api-key`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }),
    });
    setMusicConnectors(prev => prev.map(c => c.name === name ? { ...c, connected: true } : c));
    setConnectorKeyDrafts(prev => ({ ...prev, [name]: '' }));
  };

  const disconnectConnector = async (name) => {
    await fetch(`/api/music-connectors/${encodeURIComponent(name)}/revoke`, { method: 'POST' });
    setMusicConnectors(prev => prev.map(c => c.name === name ? { ...c, connected: false, user: null } : c));
  };

  const sync = async () => {
    setSyncing(true); setSyncMsg('');
    try {
      const r = await fetch('/api/sync', { method:'POST' });
      const d = await r.json();
      setSyncMsg(d.message ?? 'Done');
    } catch { setSyncMsg('Error'); }
    finally { setSyncing(false); setTimeout(() => setSyncMsg(''), 3000); }
  };

  const clearQueue = async () => {
    setClearing(true);
    await fetch('/api/settings/queue/clear', { method:'POST' }).catch(() => {});
    setClearing(false);
  };

  const togglePlugin = async (name) => {
    await fetch(`/api/plugins/${encodeURIComponent(name)}/toggle`, { method:'POST' });
    setPlugins(prev => prev.map(p => p.name === name ? { ...p, enabled: !p.enabled } : p));
  };

  const deletePlugin = async (name) => {
    await fetch(`/api/plugins/${encodeURIComponent(name)}`, { method:'DELETE' });
    setPlugins(prev => prev.filter(p => p.name !== name));
  };

  const addPlugin = async () => {
    if (!newPlugin.name.trim() || !newPlugin.baseUrl.trim()) return;
    const plugin = { ...newPlugin, enabled: true, endpoints: {} };
    await fetch('/api/plugins', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(plugin) });
    setPlugins(prev => { const idx = prev.findIndex(p => p.name === plugin.name); return idx >= 0 ? prev.map((p,i) => i===idx ? plugin : p) : [...prev, plugin]; });
    setNewPlugin({ name:'', description:'', baseUrl:'' });
    setAddingPlugin(false);
  };

  const openRawEditor = () => {
    setRawDraft(JSON.stringify(plugins, null, 2));
    setRawError('');
    setEditingRaw(true);
  };

  const saveRaw = async () => {
    setRawError('');
    let parsed;
    try {
      parsed = JSON.parse(rawDraft);
      if (!Array.isArray(parsed)) throw new Error('Must be a JSON array [ … ]');
    } catch (e) {
      setRawError(e.message);
      return;
    }
    setRawSaving(true);
    try {
      const r = await fetch('/api/plugins/raw', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ content: rawDraft }) });
      const d = await r.json();
      if (!r.ok) { setRawError(d.error ?? 'Save failed'); return; }
      setPlugins(parsed);
      setEditingRaw(false);
    } catch (e) {
      setRawError(e.message);
    } finally {
      setRawSaving(false);
    }
  };

// ── Notification sound — two-tone chime via Web Audio API ───────────────────
function playNotificationSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const chime = (freq, start, dur, vol = 0.18) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, start);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
      osc.start(start);
      osc.stop(start + dur);
    };
    const t = ctx.currentTime;
    chime(1047, t,        0.18); // C6
    chime(1319, t + 0.12, 0.22); // E6
  } catch {}
}
